<!DOCTYPE html>
<html>
<head>
    <title>ConceptClarity</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Scientific Term Explainer</h1>

    <div class="input-section">

        <input
            type="text"
            id="termInput"
            placeholder="Enter scientific term"
        >

        <select id="langSelect">

            <option value="en">English</option>
            <option value="kn">Kannada</option>
            <option value="bn">Bengali</option>
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="ta">Tamil</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="ru">Russian</option>
            <option value="ko">Korean</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="tr">Turkish</option>

        </select>

        <button onclick="getExplanation()">
            Explain
        </button>

    </div>

    <div id="resultSection"></div>

</div>

<script>

function formatJSON(obj) {
    return JSON.stringify(obj, null, 2);
}


// ---------------- EXPLAIN ----------------
async function getExplanation() {

    const term = document.getElementById("termInput").value.trim();
    const lang = document.getElementById("langSelect").value;
    const resultDiv = document.getElementById("resultSection");

    if (!term) {
        resultDiv.innerHTML = "<p>Please enter a term.</p>";
        return;
    }

    const currentScroll = window.scrollY;

    resultDiv.style.opacity = "0.5";

    try {

        const response = await fetch("/explain", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ term, lang })
        });

        const data = await response.json();

        if (data.error) {
            resultDiv.innerHTML = `<p>${data.error}</p>`;
            return;
        }

        resultDiv.innerHTML = `
            <div class="result">
                <h2>${data.term}</h2>
                <p>${data.explanation}</p>

                <h3>Real World Example</h3>
                <p>${data.example}</p>

                <h3>Related Terms</h3>
                <div class="related-terms">
                    ${data.related_terms.map(term => 
                        `<button onclick="searchRelated('${term}')">${term}</button>`
                    ).join("")}
                </div>
            </div>

            <div class="json-box">
                <h3>JSON Response:</h3>
                <pre class="json-pre">
${formatJSON(data)}
                </pre>
            </div>
        `;

        resultDiv.style.opacity = "1";

        window.scrollTo(0, currentScroll);

    } catch (error) {
        resultDiv.innerHTML = "<p>Error generating explanation.</p>";
    }
}

// ---------------- RELATED SEARCH ----------------
function searchRelated(term) {

    term = term.trim();

    document.getElementById("termInput").value = term;

    getExplanation();
}

</script>

</body>
</html>
